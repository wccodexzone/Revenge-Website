<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upcoming Link</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Consolas,monospace;
}

body{
background:#000;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:#00ff66;
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

.container{

width:90%;
max-width:700px;
padding:45px;
border-radius:20px;
text-align:center;

background:rgba(0,0,0,.75);

border:1px solid #00ff66;

box-shadow:

0 0 20px #00ff66,

0 0 50px rgba(0,255,100,.25);

backdrop-filter:blur(8px);

}

h1{

font-size:58px;

margin-bottom:30px;

letter-spacing:4px;

color:#00ff66;

text-shadow:

0 0 10px #00ff66,

0 0 20px #00ff66,

0 0 40px #00ff66;

animation:glow 2s infinite alternate;

}

@keyframes glow{

from{

text-shadow:

0 0 5px #00ff66,

0 0 20px #00ff66;

}

to{

text-shadow:

0 0 20px #00ff66,

0 0 50px #00ff66,

0 0 80px #00ff66;

}

}

#timer{

font-size:36px;

font-weight:bold;

margin-bottom:35px;

line-height:1.8;

}

button{

padding:18px 55px;

font-size:20px;

border:none;

cursor:pointer;

border-radius:50px;

background:#00ff66;

color:#000;

font-weight:bold;

transition:.3s;

box-shadow:

0 0 15px #00ff66,

0 0 35px #00ff66;

}

button:hover{

transform:scale(1.05);

box-shadow:

0 0 25px #00ff66,

0 0 60px #00ff66;

}

#loading{

display:none;

margin-top:30px;

font-size:22px;

font-weight:bold;

color:#00ff66;

}

#message{

display:none;

margin-top:25px;

font-size:22px;

color:#ffd54f;

font-weight:bold;

}

</style>

</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<h1>UPCOMING LINK</h1>

<div id="timer"></div>

<button id="openBtn">

OPEN LINK

</button>

<div id="loading">

INITIALIZING...

</div>

<div id="message">

🔒 Link Locked.<br>

When this timer is over,<br>

then the link is unlocked.

</div>

</div>

<script>
  // =========================
// LINK
// =========================

const realLink = "https://example.com";

// =========================
// DATE
// =========================

const endDate = new Date("2026-08-06T00:00:00").getTime();

const timer = document.getElementById("timer");
const btn = document.getElementById("openBtn");
const loading = document.getElementById("loading");
const message = document.getElementById("message");

// =========================
// COUNTDOWN
// =========================

function updateTimer(){

const now = new Date().getTime();

const distance = endDate - now;

if(distance <= 0){

timer.innerHTML = "ACCESS GRANTED";

btn.innerHTML = "OPEN LINK";

btn.onclick = function(){

window.open(realLink,"_blank");

};

return;

}

const days = Math.floor(distance/(1000*60*60*24));

const hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));

const minutes = Math.floor((distance%(1000*60*60))/(1000*60));

const seconds = Math.floor((distance%(1000*60))/1000);

timer.innerHTML =
days+" DAYS<br>"+
hours+" HOURS "+
minutes+" MINUTES "+
seconds+" SECONDS";

}

updateTimer();

setInterval(updateTimer,1000);

// =========================
// MATRIX BACKGROUND
// =========================

const canvas = document.getElementById("matrix");

const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;

canvas.height = window.innerHeight;

const chars =
"01ABCDEFGHIJKLMNOPQRSTUVWXYZ";

const fontSize = 16;

const columns = Math.floor(canvas.width/fontSize);

const drops = [];

for(let i=0;i<columns;i++){

drops[i]=1;

}

function draw(){

ctx.fillStyle="rgba(0,0,0,.06)";

ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ff66";

ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

const text=chars[Math.floor(Math.random()*chars.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975){

drops[i]=0;

}

drops[i]++;

}

}

setInterval(draw,33);
  btn.addEventListener("click", function () {

    if (new Date().getTime() >= endDate) {
        window.open(realLink, "_blank");
        return;
    }

    loading.style.display = "block";
    message.style.display = "none";

    const texts = [
        "Loading.",
        "Loading..",
        "Loading...",
        "Please wait...",
        "Checking timer..."
    ];

    let i = 0;

    const animation = setInterval(function () {
        loading.innerHTML = texts[i % texts.length];
        i++;
    }, 500);

    setTimeout(function () {

        clearInterval(animation);

        loading.style.display = "none";

        message.style.display = "block";

        setTimeout(function () {

            message.style.display = "none";

        }, 3000);

    }, 3000);

});

window.addEventListener("resize", function () {

    canvas.width = window.innerWidth;

    canvas.height = window.innerHeight;

});

</script>

</body>
</html>

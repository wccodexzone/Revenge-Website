<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Viral Link 2026</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Consolas,monospace;
}

body{
    background:#050505;
    color:#00ff88;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

canvas{
    position:fixed;
    inset:0;
    z-index:-1;
}

.container{
    width:90%;
    max-width:720px;
    text-align:center;
    padding:45px;
    border:1px solid rgba(0,255,136,.35);
    border-radius:22px;
    background:rgba(0,0,0,.72);
    backdrop-filter:blur(10px);
    box-shadow:
    0 0 20px rgba(0,255,136,.35),
    0 0 60px rgba(0,255,136,.15);
}

h1{
    font-size:58px;
    letter-spacing:4px;
    margin-bottom:30px;
    color:#00ff88;
    text-shadow:
    0 0 10px #00ff88,
    0 0 30px #00ff88;
}

#timer{
    font-size:34px;
    font-weight:bold;
    margin-bottom:35px;
    line-height:1.8;
}

button{
    padding:18px 55px;
    border:none;
    border-radius:40px;
    cursor:pointer;
    background:#00ff88;
    color:#000;
    font-size:20px;
    font-weight:bold;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}

#loading{
    display:none;
    font-size:22px;
    margin-top:25px;
    color:#00ff88;
}

#message{
    display:none;
    margin-top:25px;
    color:#ffd54f;
    font-size:20px;
    font-weight:bold;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<h1>REVENGE STARTED ✅</h1>

<div id="timer">Loading...</div>

<button id="openBtn">OPEN LINK</button>

<div id="loading">Loading...</div>

<div id="message">
🔒 Link Locked.<br>
When this timer is over,<br>
then the link is automatically unlocked.
</div>

</div>

<script>
  // =========================
// SET YOUR LINK HERE
// =========================

const realLink = "https://example.com";

// Countdown End Date
const endDate = new Date("2026-08-06T00:00:00").getTime();

// Elements
const timer = document.getElementById("timer");
const btn = document.getElementById("openBtn");
const loading = document.getElementById("loading");
const message = document.getElementById("message");

// =========================
// COUNTDOWN TIMER
// =========================

function updateTimer(){

    const now = new Date().getTime();

    const distance = endDate - now;

    if(distance <= 0){

        timer.innerHTML = "✅ LINK UNLOCKED";

        btn.innerHTML = "OPEN LINK";

        return;
    }

    const days = Math.floor(distance/(1000*60*60*24));

    const hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));

    const minutes = Math.floor((distance%(1000*60*60))/(1000*60));

    const seconds = Math.floor((distance%(1000*60))/1000);

    timer.innerHTML =
        days + " Days<br>" +
        hours + " Hours " +
        minutes + " Minutes " +
        seconds + " Seconds";

}

updateTimer();

setInterval(updateTimer,1000);

// =========================
// MATRIX BACKGROUND
// =========================

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters =
"ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

const fontSize = 16;

const columns = Math.floor(canvas.width/fontSize);

const drops = [];

for(let i=0;i<columns;i++){

    drops[i]=1;

}

function drawMatrix(){

    ctx.fillStyle="rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#00ff88";
    ctx.font=fontSize+"px monospace";

    for(let i=0;i<drops.length;i++){

        const text=
        letters.charAt(
        Math.floor(Math.random()*letters.length)
        );

        ctx.fillText(
        text,
        i*fontSize,
        drops[i]*fontSize
        );

        if(
        drops[i]*fontSize>canvas.height &&
        Math.random()>0.975
        ){
            drops[i]=0;
        }

        drops[i]++;

    }

}

setInterval(drawMatrix,33);
  // =========================
// OPEN BUTTON
// =========================

btn.addEventListener("click",function(){

    // Timer শেষ হলে Link খুলবে
    if(new Date().getTime()>=endDate){

        window.open(realLink,"_blank");

        return;

    }

    // Button Hide
    btn.style.display="none";

    loading.style.display="block";

    message.style.display="none";

    const frames=[
        "Loading.",
        "Loading..",
        "Loading...",
        "Loading....",
        "Please Wait..."
    ];

    let index=0;

    const animation=setInterval(function(){

        loading.innerHTML=frames[index%frames.length];

        index++;

    },400);

    // ৩ সেকেন্ড Loading
    setTimeout(function(){

        clearInterval(animation);

        loading.style.display="none";

        message.style.display="block";

        // ৩০ সেকেন্ড Message থাকবে
        setTimeout(function(){

            message.style.display="none";

            btn.style.display="inline-block";

        },30000);

    },3000);

});

// Responsive Canvas
window.addEventListener("resize",function(){

    canvas.width=window.innerWidth;

    canvas.height=window.innerHeight;

});

</script>

</body>
</html>
